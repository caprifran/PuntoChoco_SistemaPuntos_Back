server.port=4000

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:puntochoco_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# H2 Console (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OAuth2 Resource Server (Keycloak)
# El issuer-uri es la identidad (debe coincidir con la URL que ve el navegador)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
# El jwk-set-uri es de donde el backend descarga las llaves (usa la red interna de Docker)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_INTERNAL_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs

# Keycloak Admin Client Configuration
keycloak.server-url=${KEYCLOAK_INTERNAL_URL}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
keycloak.admin.user=${KEYCLOAK_ADMIN_USER:}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:}
