server.port=4000

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:puntochoco_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# H2 Console (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=PuntoChocoSecretKey2024MuySeguraConMasDe256Bits!
jwt.expiration=86400000
