server.port=${PORT:4000}

# Supabase PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:6543}/${DB_NAME}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# JWT
jwt.secret=${JWT_SECRET:PuntoChocoSecretKey2024MuySeguraConMasDe256Bits!}
jwt.expiration=${JWT_EXPIRATION:86400000}
